<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Buchstabenlichtung</title>
  <desc id="desc">Warme Kinderbuchszene mit offenem Buch, schwebenden Buchstaben und Pflanzen.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fff6df"/><stop offset=".52" stop-color="#ffe0b3"/><stop offset="1" stop-color="#f6b36f"/></linearGradient>
    <radialGradient id="sun" cx=".28" cy=".22" r=".45"><stop stop-color="#fffdf2"/><stop offset=".55" stop-color="#ffd98f" stop-opacity=".68"/><stop offset="1" stop-color="#ffd98f" stop-opacity="0"/></radialGradient>
    <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency=".018" numOctaves="4" seed="14"/><feColorMatrix type="saturate" values=".18"/><feComponentTransfer><feFuncA type="table" tableValues="0 .18"/></feComponentTransfer></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#8b5a2b" flood-opacity=".18"/></filter>
    <style>
      .float{animation:float 5.6s ease-in-out infinite}.float2{animation:float 6.4s ease-in-out infinite reverse}.page{animation:page 4.8s ease-in-out infinite}
      @keyframes float{50%{transform:translateY(-18px) rotate(3deg)}}@keyframes page{50%{transform:skewY(-2deg) translateY(-4px)}}
    </style>
  </defs>
  <rect width="1200" height="750" fill="url(#sky)"/><rect width="1200" height="750" filter="url(#paper)" opacity=".75"/><circle cx="300" cy="150" r="290" fill="url(#sun)"/>

    <text class="float" x="218" y="308" font-size="118" fill="#c96f2d">A</text><text class="float2" x="935" y="270" font-size="96" fill="#7b8fc9">M</text><text class="float" x="790" y="185" font-size="68" fill="#d9899b">ei</text><text class="float2" x="158" y="455" font-size="72" fill="#4e9a76">sch</text>
